name: Arranging image building
hosts: builder

 - name: Installing docker environment
    ansible.builtin.apt:
      name:
      - docker
      state: present
 - name: Preparing destination path
   ansible.builtin.file:
       path: /usr/src/docker/
       state: directory
 - name: Delivering source files
   ansible.builtin.copy:
     src: /home/superuser/Dockerfile
     dest: /usr/src/docker/
     state: present
  - name: Building artifact
    community.docker.docker_image:
    build:
      path: /usr/src/docker
    name: electedfx/ansible/java_app
    tag: v1
    push: true
    source: build
  - name: Log in to dockerhub registry
  community.docker.docker_login:
    username: electedfx
    password: !vault |
