---
- name: setup nginx
  hosts: all
  become: true 

  vars:
   source_folder: ./
   dest_folder: /var/www/html
  
  tasks:
  - name: Ensure nginx is present
    apt:
     name: nginx
     state: present
  
  - name: templating web servers
    template: src={{source_folder}}/index.j2 dest={{ dest_folder }}/index.html mode=0555
    notify:
     - restart nginx

  handlers:
  - name: restart nginx
    service: name=nginx state=restarted
