---
# tasks file for building_artifacts
- name: Preparing destination path
  ansible.builtin.file:
    path: /usr/src/docker/
    state: directory
- name: Delivering source files
  ansible.builtin.template:
    src: Dockerfile.j2
    dest: /usr/src/docker/Dockerfile
- name: Building artifact
  community.docker.docker_image:
    build:
       path: /usr/src/docker
    name: electedfx/java_app
    tag: latest
    push: true
    source: build
